name: Publish Theme Updates

on:
  push:
    branches: [main, master]

jobs:
  publish:
    name: Build, package & publish theme update packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Build parent theme (lacadev-client)
        working-directory: app/public/wp-content/themes/lacadev-client
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build child theme (lacadev-client-child)
        working-directory: app/public/wp-content/themes/lacadev-client-child
        run: |
          cp config.json.dist config.json
          yarn install --frozen-lockfile
          yarn build

      - name: Read theme versions
        id: versions
        working-directory: app/public/wp-content/themes
        run: |
          PARENT_VERSION=$(grep -m1 '^ \* Version:' lacadev-client/theme/style.css | sed -E 's/^ \* Version:[[:space:]]*//')
          CHILD_VERSION=$(grep -m1 '^ \* Version:' lacadev-client-child/theme/style.css | sed -E 's/^ \* Version:[[:space:]]*//')
          echo "parent=$PARENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "child=$CHILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Package theme zips
        working-directory: app/public/wp-content/themes
        run: |
          mkdir -p "$GITHUB_WORKSPACE/publish"

          zip -r "$GITHUB_WORKSPACE/publish/lacadev-client.zip" lacadev-client \
            -x "lacadev-client/.git/*" \
            -x "lacadev-client/.github/*" \
            -x "lacadev-client/node_modules/*" \
            -x "lacadev-client/*.md"

          zip -r "$GITHUB_WORKSPACE/publish/lacadev-client-child.zip" lacadev-client-child \
            -x "lacadev-client-child/.git/*" \
            -x "lacadev-client-child/.github/*" \
            -x "lacadev-client-child/node_modules/*" \
            -x "lacadev-client-child/*.md"

      - name: Generate update JSON files
        env:
          PARENT_VERSION: ${{ steps.versions.outputs.parent }}
          CHILD_VERSION: ${{ steps.versions.outputs.child }}
          BUILD_DATE: ${{ steps.versions.outputs.date }}
        run: |
          cat > "$GITHUB_WORKSPACE/publish/lacadev-client.json" <<EOF
          {
            "name": "La Cà Dev - Client",
            "version": "$PARENT_VERSION",
            "download_url": "https://client.lacadev.com/theme-updates/lacadev-client.zip",
            "details_url": "https://client.lacadev.com",
            "requires": "6.0",
            "requires_php": "8.0",
            "last_updated": "$BUILD_DATE",
            "description": "Theme cha La Cà Dev - Client — cập nhật tự động từ client.lacadev.com",
            "changelog": ""
          }
          EOF

          cat > "$GITHUB_WORKSPACE/publish/lacadev-client-child.json" <<EOF
          {
            "name": "La Cà Dev - Client Child",
            "version": "$CHILD_VERSION",
            "download_url": "https://client.lacadev.com/theme-updates/lacadev-client-child.zip",
            "details_url": "https://client.lacadev.com",
            "requires": "6.0",
            "requires_php": "8.0",
            "last_updated": "$BUILD_DATE",
            "description": "Theme con La Cà Dev - Client Child — cập nhật tự động từ client.lacadev.com",
            "changelog": ""
          }
          EOF

      - name: Upload theme-updates package
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/theme-updates/
          local-dir: publish/
